   <body>
    <form>
        <table>
        <tr>
            <td colspan="6" class="form-title">Student Form</td>
         </tr>
     <tr>
            <td>First Name</td>
            <td><input type="text" id="firstName"></td>
            <td>Surname</td>
            <td><input type="text" id="surname"></td>
            <td>Age</td>
            <td><input type="text" id="age"></td>
            <td>Mobile Number</td>
            <td><input type="text" id="mobileNumber"></td>
     </tr>
         <tr>
         <td>Email </td>
         <td><input type="text" id="Email"></td>
         <td>Country</td>
         <td>
            <select id="country" onchange="onCountrychange(this.value)">
                <option value="" selected disabled>Select A Country</option>
                <option value="1">India</option>
                <option value="2">Australia</option>
            </select>
         </td>
        <td>State</td>
        <td>
            <select id="state" onchange="onStatechange(this.value)">
                <option value="" selected disabled>Select A State</option>
            </select>
        </td>
        <td>City</td>
        <td>
            <select id="city" onchange="onCitychange(this.value)">
                <option value=""selected disabled>Select A City</option>
            </select>
        </td>
         </tr>
         <tr>
            <td>University</td>
            <td><select id="University" onchange="onUniversitychange(this.value)">
                <option value="" selected disabled>Select A University</option>
                 
            </select>
        </td>
            <td>College</td>
            <td>
                <select id="college" onchange="oncollegechange(this.value)">
                    <option value="" selected disabled>Selec A College</option>
                </select>
            </td>
            <td>Program</td>
            <td>
                <select id="Program">
                    <option value="" selected disabled>Select A Program</option>
                    <option value="1">EEE</option>
                    <option value="2">ECE</option>  
                    <option value="3">Mechanical</option>
                    <option value="4">AE</option>
                    <option value="5">CSE</option>
                  
                   
                </select>
            </td>
            <td>Year</td>
            <td>
                <select id="Year">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </td>
         </tr>
        </table>
        <br>
        <center>
            <button type="button" onclick="saveStudent()">SAVE </button>
        </center>
    </form>
    <br>
